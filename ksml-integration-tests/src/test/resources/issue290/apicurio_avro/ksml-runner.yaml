ksml:
  definitions:
    producer: producer-avro.yaml
  schemaRegistries:
    my_schema_registry:
      config:
        apicurio.registry.url: http://schema-registry:8081/apis/registry/v2
        apicurio.registry.auto-register: false
        apicurio.registry.auto-register.if-exists: RETURN
  notations:
    avro:
      type: apicurio_avro
      schemaRegistry: my_schema_registry
      config:
        normalize.schemas: true
        auto.register.schemas: false
  storageDirectory: /ksml/state
  createStorageDirectory: true

kafka:
  bootstrap.servers: broker:9093
  application.id: io.ksml.apicurio.issue290.test
  security.protocol: PLAINTEXT
  acks: all
