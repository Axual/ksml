streams:
  json_sensor_input:
    topic: sensor_data_jsonschema_evolution
    keyType: string
    valueType: jsonschema:SensorData
    offsetResetPolicy: earliest

  json_sensor_output:
    topic: sensor_data_jsonschema_evolution_processed
    keyType: string
    valueType: json

functions:
  process_sensor_v2:
    type: valueTransformer
    code: |
      result = dict(value) if value else None
      if result and result.get("name"):
        result["name"] = result["name"].upper()
    expression: result
    resultType: json

pipelines:
  json_evolution_pipeline:
    from: json_sensor_input
    via:
      - type: transformValue
        mapper: process_sensor_v2
    to: json_sensor_output
