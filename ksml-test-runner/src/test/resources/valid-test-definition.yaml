name: "Filter keeps only blue sensors"
definition: pipelines/test-filter.yaml
schemaDirectory: schemas

streams:
  sensor_source:
    topic: ksml_sensordata_avro
    keyType: string
    valueType: "avro:SensorData"
  sensor_filtered:
    topic: ksml_sensordata_filtered
    keyType: string
    valueType: "avro:SensorData"

tests:
  blue_sensors_pass:
    produce:
      - to: sensor_source
        messages:
          - key: "sensor1"
            value: { name: "sensor1", timestamp: 1000, value: "20.0", type: "TEMPERATURE", unit: "C", color: "blue", city: "Amsterdam" }
          - key: "sensor2"
            value: { name: "sensor2", timestamp: 2000, value: "60.0", type: "HUMIDITY", unit: "%", color: "red", city: "Utrecht" }
          - key: "sensor3"
            timestamp: 1000
            value: { name: "sensor3", timestamp: 3000, value: "25.0", type: "TEMPERATURE", unit: "C", color: "blue", city: "Rotterdam" }

    assert:
      - on: sensor_filtered
        code: |
          assert len(records) == 2
          for r in records:
            assert r["value"]["color"] == "blue"
