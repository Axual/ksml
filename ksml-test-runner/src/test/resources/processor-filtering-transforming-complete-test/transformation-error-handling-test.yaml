test:
  name: "Malformed sensor data is routed to alerts_stream when transformation fails"
  pipeline: ../../../../../ksml/src/test/resources/docs-examples/beginner-tutorial/filtering-transforming/processor-filtering-transforming-complete.yaml

  registry:
    - topic: tutorial_input
      keyType: string
      valueType: json
    - topic: filtered_data
      keyType: string
      valueType: json
    - topic: alerts_stream
      keyType: string
      valueType: json

  produce:
    - topic: tutorial_input
      keyType: string
      valueType: json
      messages:
        - key: "sensor4"
          value:
            invalid_field: "malformed"

  assert:
    - topic: alerts_stream
      code: |
        if len(records) > 0:
            error = records[0]["value"]
            assert "error" in error, "Expected 'error' field in alert record"
            assert error["sensor_id"] == "sensor4", f"Expected sensor_id 'sensor4', got {error['sensor_id']}"
