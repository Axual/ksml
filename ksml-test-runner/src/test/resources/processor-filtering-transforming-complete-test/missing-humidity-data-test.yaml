test:
  name: "Sensor data without humidity is filtered out"
  pipeline: ../../../../../ksml/src/test/resources/docs-examples/beginner-tutorial/filtering-transforming/processor-filtering-transforming-complete.yaml

  registry:
    - topic: tutorial_input
      keyType: string
      valueType: json
    - topic: filtered_data
      keyType: string
      valueType: json
    - topic: alerts_stream
      keyType: string
      valueType: json

  produce:
    - topic: tutorial_input
      keyType: string
      valueType: json
      messages:
        - key: "sensor3"
          value:
            sensors:
              temperature:
                value: 75
                unit: "F"
              location:
                value: "office"
                unit: "text"
            metadata:
              timestamp: 1700000000000

  assert:
    - topic: filtered_data
      code: |
        assert len(records) == 0, f"Expected no records on filtered_data, got {len(records)}"
    - topic: alerts_stream
      code: |
        assert len(records) == 0, f"Expected no records on alerts_stream, got {len(records)}"
