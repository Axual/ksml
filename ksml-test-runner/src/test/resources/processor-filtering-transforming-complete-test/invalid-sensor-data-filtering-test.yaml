test:
  name: "Out-of-range temperature is filtered out"
  pipeline: pipelines/processor-filtering-transforming-complete.yaml

  registry:
    - topic: tutorial_input
      keyType: string
      valueType: json
    - topic: filtered_data
      keyType: string
      valueType: json
    - topic: alerts_stream
      keyType: string
      valueType: json

  produce:
    - topic: tutorial_input
      keyType: string
      valueType: json
      messages:
        - key: "sensor1"
          value:
            sensors:
              temperature:
                value: 250
                unit: "F"
              humidity:
                value: 50
                unit: "%"
              location:
                value: "warehouse"
                unit: "text"
            metadata:
              timestamp: 1700000000000

  assert:
    - topic: filtered_data
      code: |
        assert len(records) == 0, f"Expected no records on filtered_data, got {len(records)}"
    - topic: alerts_stream
      code: |
        assert len(records) == 0, f"Expected no records on alerts_stream, got {len(records)}"
