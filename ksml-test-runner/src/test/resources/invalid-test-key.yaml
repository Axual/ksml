name: "Test key violates identifier regex"
definition: pipelines/test-filter.yaml
streams:
  source:
    topic: ksml_sensordata_avro
    keyType: string
    valueType: "avro:SensorData"
tests:
  "test with spaces":
    produce:
      - to: source
        messages:
          - key: "k1"
            value: { color: "blue" }
    assert:
      - on: source
        code: |
          assert True
