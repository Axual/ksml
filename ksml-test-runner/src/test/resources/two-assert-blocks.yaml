name: "Two assert blocks on the same stream"
definition: pipelines/test-filter.yaml
schemaDirectory: schemas

streams:
  sensor_source:
    topic: ksml_sensordata_avro
    keyType: string
    valueType: "avro:SensorData"
  sensor_filtered:
    topic: ksml_sensordata_filtered
    keyType: string
    valueType: "avro:SensorData"

tests:
  two_blocks_same_stream:
    description: "Two assert blocks both reference sensor_filtered"
    produce:
      - to: sensor_source
        messages:
          - key: "sensor-1"
            value:
              name: "sensor-1"
              timestamp: 1000
              value: "25.0"
              type: "TEMPERATURE"
              unit: "celsius"
              color: "blue"
          - key: "sensor-2"
            value:
              name: "sensor-2"
              timestamp: 2000
              value: "60.0"
              type: "HUMIDITY"
              unit: "percent"
              color: "red"

    assert:
      # Block 1 — drains the topic queue
      - on: sensor_filtered
        code: |
          assert len(records) == 1, f"Expected 1 filtered record, got {len(records)}"

      # Block 2 — topic queue is now empty; records is []
      - on: sensor_filtered
        code: |
          assert len(records) == 1, f"Expected 1 record in second block, got {len(records)}"
          assert records[0]["key"] == "sensor-1", f"Expected key 'sensor-1', got {records[0]['key']}"
