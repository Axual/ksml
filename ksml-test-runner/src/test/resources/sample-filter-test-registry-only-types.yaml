test:
  name: "Filter pipeline with types only in registry block"
  pipeline: pipelines/test-filter-confluent-avro.yaml
  schemaDirectory: schemas
  registry:
    - topic: ksml_sensordata_avro
      keyType: string
      valueType: "avro:SensorData"
    - topic: ksml_sensordata_filtered
      keyType: string
      valueType: "avro:SensorData"

  produce:
    - topic: ksml_sensordata_avro
      messages:
        - key: "sensor-1"
          value:
            name: "sensor-1"
            timestamp: 1000
            value: "25.0"
            type: "TEMPERATURE"
            unit: "celsius"
            color: "blue"
        - key: "sensor-2"
          value:
            name: "sensor-2"
            timestamp: 2000
            value: "60.0"
            type: "HUMIDITY"
            unit: "percent"
            color: "red"

  assert:
    - topic: ksml_sensordata_filtered
      code: |
        assert len(records) == 1, f"Expected 1 filtered record, got {len(records)}"
        assert records[0]["key"] == "sensor-1"
