name: "Reference to undefined stream"
pipeline: pipelines/test-filter.yaml
streams:
  source:
    topic: ksml_sensordata_avro
    keyType: string
    valueType: "avro:SensorData"
tests:
  bad_reference:
    produce:
      - to: nonexistent
        messages:
          - key: "k1"
            value: { color: "blue" }
    assert:
      - on: source
        code: |
          assert True
