test:
  name: "Simple passthrough with Python produce block"
  pipeline: pipelines/test-passthrough.yaml

  produce:
    - topic: input_topic
      keyType: string
      valueType: string
      generator:
        name: generate_test_data
        globalCode: |
          CITIES = ["Amsterdam", "Utrecht", "Rotterdam"]
        code: |
          result = []
          for i in range(len(CITIES)):
            key = f"sensor-{i}"
            value = CITIES[i]
            result.append((key, value))
        expression: result
      count: 1

  assert:
    - topic: output_topic
      code: |
        assert len(records) == 3, f"Expected 3 records, got {len(records)}"
        assert records[0]["key"] == "sensor-0", f"Expected key 'sensor-0', got {records[0]['key']}"
        assert records[0]["value"] == "Amsterdam", f"Expected value 'Amsterdam', got {records[0]['value']}"
        assert records[1]["key"] == "sensor-1"
        assert records[1]["value"] == "Utrecht"
        assert records[2]["key"] == "sensor-2"
        assert records[2]["value"] == "Rotterdam"