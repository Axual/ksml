test:
  name: "Filter pipeline with AVRO Python produce block"
  pipeline: pipelines/test-filter.yaml
  schemaDirectory: schemas

  produce:
    - topic: ksml_sensordata_avro
      keyType: string
      valueType: "avro:SensorData"
      generator:
        name: generate_sensor_data
        globalCode: |
          COLORS = ["blue", "red", "blue"]
          SENSOR_TYPES = ["TEMPERATURE", "HUMIDITY", "LENGTH"]
          VALUES = ["25.0", "60.0", "10.0"]
          UNITS = ["celsius", "percent", "meters"]
          TIMESTAMPS = [1000, 2000, 3000]
        code: |
          result = []
          for i in range(3):
            key = f"sensor-{i+1}"
            value = {
              "name": f"sensor-{i+1}",
              "timestamp": TIMESTAMPS[i],
              "value": VALUES[i],
              "type": SENSOR_TYPES[i],
              "unit": UNITS[i],
              "color": COLORS[i],
              "city": None,
              "owner": None
            }
            result.append((key, value))
        expression: result
      count: 1

  assert:
    - topic: ksml_sensordata_filtered
      code: |
        assert len(records) == 2, f"Expected 2 filtered records, got {len(records)}"
        assert records[0]["key"] == "sensor-1", f"Expected key 'sensor-1', got {records[0]['key']}"
        assert records[1]["key"] == "sensor-3", f"Expected key 'sensor-3', got {records[1]['key']}"
        # Note: The records might be serialized strings when using StringDeserializer in AssertionRunner
        # This assertion works because the filter checks the input, not the output format