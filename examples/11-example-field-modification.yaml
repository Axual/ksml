# $schema: https://axual.github.io/ksml/latest/ksml-language-spec.json

# This example shows how to read from an AVRO stream, modify a specific field and output to a target stream
# with a different schema. For validation purposes a second pipeline outputs the modified results.

streams:
  sensor_source:
    topic: ksml_sensordata_avro
    keyType: string
    valueType: avro:SensorData
    offsetResetPolicy: latest
  sensor_target:
    topic: ksml_sensordata_modified
    keyType: string
    valueType: avro:SensorDataNoColor

functions:
  # This function changes the "owner" field and returns the modified version
  replace_owner:
    type: valueTransformer
    code: |
      if value is not None:
        value["owner"] = "Zack"
    expression: value
    resultType: avro:SensorData

  # This function removes the "color" field from the schema. It leaves the value field intact, but
  # since the field is not defined in the schema anymore, it will no longer be written to the output
  # topic. If you want it deleted explicitly for further pipeline processing, you can uncomment the
  # last code line below.
  remove_color:
    type: valueTransformer
    code: |
      if value is not None:
        del value["color"] # Remove color information from the value and return as SensorDataNoColor
    expression: value
    resultType: avro:SensorDataNoColor

pipelines:
  main:
    from: sensor_source
    via:
      - type: peek
        forEach:
          code: log.info("INPUT - key={}, value={}", key, value)
      - type: transformValue
        mapper: replace_owner
      - type: transformValue
        mapper: remove_color
    to: sensor_target

  validate:
    from: sensor_target
    forEach:
      code: log.info("OUTPUT - key={}, value={}", key, value)
