# $schema: https://raw.githubusercontent.com/Axual/ksml/refs/heads/main/docs/ksml-language-spec.json

streams:
  sensor_source_avro:
    topic: ksml_sensordata_avro
    keyType: string
    valueType: avro:SensorData

stores:
  last_sensor_data_store:
    versioned: true
    type: keyValue
    keyType: string
    valueType: json
    persistent: true
    segmentInterval: 60s
    historyRetention: 1h
    caching: false
    logging: false

functions:
  process_message:
    type: forEach
    globalCode: |
      import time
    code: |
      log.info("Processing message: key={}, value={}", key, value)
      last_value = last_sensor_data_store.get(key)
      
      if last_value != None:
        log.info("Found last value in versioned state store: key={}, timestamp={}, value={}", key, last_value["timestamp"], last_value["value"])
      time_in_millis = round(time.time() * 1000)
      last_sensor_data_store.put(key, value, time_in_millis)
      if value != None:
        log.info("Stored new value in versioned state store: key={}, timestamp={}, value={}", key, time_in_millis, value)
    stores:
      - last_sensor_data_store

pipelines:
  process_message:
    from: sensor_source_avro
    forEach: process_message
