name: Maven Build and Test

on:
  workflow_call:
    outputs:
      artifact-name:
        description: "Name of the uploaded build artifact"
        value: ${{ jobs.build.outputs.artifact-name }}
  workflow_dispatch:

jobs:
  build:
    name: Build and test with GraalVM
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write
      checks: write
    outputs:
      artifact-name: build-artifacts-${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Fetch full history for SonarCloud analysis, because SonarCloud needs full git history to properly analyze changes.

      - name: Set up GraalVM
        uses: actions/setup-java@v5
        with:
          distribution: 'graalvm'
          java-version: '25'
          cache: 'maven'

      - name: Log in to Docker Hub
        # Dependabot runs without access to repository secrets, so the Docker Hub
        # credentials are empty and login would fail. Skip it for Dependabot; the
        # integration tests then pull container images anonymously.
        if: github.actor != 'dependabot[bot]'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and run all tests (unit + integration)
        timeout-minutes: 60
        run: mvn clean verify -DskipITs=false --no-transfer-progress
        env:
          TESTCONTAINERS_RYUK_DISABLED: false

      - name: SonarCloud analysis
        # SonarCloud needs SONAR_TOKEN, which is unavailable to Dependabot runs.
        # Skip the analysis for Dependabot so the build does not fail on auth.
        if: github.actor != 'dependabot[bot]'
        timeout-minutes: 15
        run: |
          SONAR_ARGS=""

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            SONAR_ARGS="-Dsonar.branch.name=$GITHUB_REF_NAME"

          elif [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            SONAR_ARGS="-Dsonar.pullrequest.key=$PR_NUMBER \
              -Dsonar.pullrequest.branch=$GITHUB_HEAD_REF \
              -Dsonar.pullrequest.base=$GITHUB_BASE_REF"

          elif [[ "$GITHUB_REF_TYPE" == "branch" ]]; then
            SONAR_ARGS="-Dsonar.branch.name=$GITHUB_REF_NAME"
            if [[ "$GITHUB_REF_NAME" != "$DEFAULT_BRANCH" ]]; then
              SONAR_ARGS="${SONAR_ARGS} -Dsonar.branch.target=$DEFAULT_BRANCH"
            fi
          fi

          mvn sonar:sonar --no-transfer-progress ${SONAR_ARGS}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: github.actor != 'dependabot[bot]'
        with:
          files: |
            **/target/surefire-reports/TEST-*.xml
            **/target/failsafe-reports/TEST-*.xml
          check_name: 'Publish Test Results'

      - name: Prepare build artifacts
        run: |
          mkdir -p build-output
          cp ksml-runner/target/ksml-runner*.jar build-output/
          cp -r ksml-runner/target/libs build-output/
          cp ksml-runner/NOTICE.txt build-output/
          cp LICENSE.txt build-output/

      - name: Upload build artifacts
        id: upload
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts-${{ github.sha }}
          path: build-output/
          retention-days: 7
